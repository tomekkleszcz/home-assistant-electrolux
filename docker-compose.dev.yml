services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:${HA_VERSION:-stable}
    container_name: electrolux-ha-dev
    environment:
      TZ: ${TZ:-Europe/Warsaw}
    ports:
      - "${HA_PORT:-8123}:8123"
    volumes:
      - ./dev/config:/config
      - ./custom_components/electrolux:/config/custom_components/electrolux:ro
